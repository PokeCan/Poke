<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unova B2W2 Party UI</title>
  <style>
    @font-face {
      font-family: 'PokemonBW';
      src: url('pokemon-b-w.otf') format('woff2');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PokemonBW', sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      text-transform: uppercase;
      image-rendering: pixelated;
      touch-action: none;
    }

    /* ── The Magic Scaling Wrapper ── */
    .dex-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    .party-screen {
      width: 512px; /* Fixed DS Width */
      height: 384px; /* Fixed DS Height */
      background: #0e141b url('Graphics/Pictures/Party/bg_B2W2.png') center/cover no-repeat;
      position: relative;
      flex-shrink: 0;
      transform-origin: center center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }

    .box {
      width: 240px;
      height: 80px; 
      padding: 10px 10px 10px 55px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      cursor: pointer;
    }

    /* Column offset to mimic the DS diagonal layout */
    .box:nth-child(even) { transform: translateY(15px); }

    .box.pokemon { background-image: url('Graphics/Pictures/Party/panel_round.png'); }
    .box.pokemon.highlight { 
        background-image: url('Graphics/Pictures/Party/panel_round_sel.png'); 
        filter: brightness(1.2); 
    }
    .box.empty { background-image: url('Graphics/Pictures/Party/panel_blank.png'); opacity: 0.4; }

    .pokemon-sprite {
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .top-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: white;
      text-shadow: 2px 2px #000;
      margin-bottom: 2px;
    }

    .hp-section {
      width: 120px;
      height: 10px;
      background: #333;
      border: 1px solid #000;
      position: relative;
    }

    .hp-bar-fill {
      height: 100%;
      background: #43ef21;
      transition: width 0.3s;
    }

    .hp-text {
      font-size: 10px;
      text-align: right;
      width: 120px;
      margin-top: 2px;
      text-shadow: 1px 1px #000;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 70px;
      background: url('Graphics/Pictures/Menu/background3.png') no-repeat center bottom;
      background-size: 100% 100%;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }

    .prompt {
      background: white;
      color: #333;
      padding: 0 10px;
      border: 3px solid #707070;
      flex-grow: 1;
      height: 40px;
      display: flex;
      align-items: center; 
      font-size: 12px;
      text-transform: none;
    }

    #cancel-btn {
      width: 100px;
      height: 35px;
      background: url('Graphics/Pictures/Party/icon_cancel.png') center/contain no-repeat;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
    }
    #cancel-btn.highlight { filter: brightness(1.3) hue-rotate(20deg); }

  </style>
</head>
<body>

<div class="dex-wrapper">
  <div class="party-screen" id="main-screen">
    <div class="grid" id="party-grid"></div>

    <div class="footer">
      <div class="prompt" id="prompt-box">Choose a Pokémon.</div>
      <div id="cancel-btn" onclick="handleExit()">
        <span>CANCEL</span>
      </div>
    </div>
  </div>
</div>

<script>
  const partyMembers = [
    { id: 34,  name: 'NIDOKING',  lv: 50, chp: 205, mhp: 205 },
    { id: 2,   name: 'IVYSAUR',   lv: 50, chp: 134, mhp: 134 },
    { id: 130, name: 'GYARADOS',  lv: 20, chp: 68,  mhp: 68 },
    { id: 448, name: 'LUCARIO',   lv: 52, chp: 150, mhp: 150 },
    { id: 637, name: 'VOLCARONA', lv: 70, chp: 210, mhp: 230 },
    { id: 571, name: 'ZOROARK',   lv: 45, chp: 110, mhp: 125 }
  ];

  const grid = document.getElementById('party-grid');
  const promptBox = document.getElementById('prompt-box');
  const dexScreen = document.getElementById('main-screen');
  let currentIndex = 0;

  function initParty() {
    grid.innerHTML = '';
    partyMembers.forEach((p, i) => {
      const box = document.createElement('div');
      box.className = 'box pokemon';
      box.onclick = () => { currentIndex = i; updateSelection(); };
      
      const pct = (p.chp / p.mhp) * 100;
      const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${p.id}.gif`;

      box.innerHTML = `
        <img src="${spriteUrl}" class="pokemon-sprite">
        <div class="top-info"><span>${p.name}</span><span>LV${p.lv}</span></div>
        <div class="hp-section"><div class="hp-bar-fill" style="width: ${pct}%;"></div></div>
        <div class="hp-text">${p.chp}/${p.mhp}</div>
      `;
      grid.appendChild(box);
    });

    updateSelection();
  }

  function updateSelection() {
    document.querySelectorAll('.box, #cancel-btn').forEach(el => el.classList.remove('highlight'));
    const allItems = [...document.querySelectorAll('.box'), document.getElementById('cancel-btn')];
    
    if(allItems[currentIndex]) allItems[currentIndex].classList.add('highlight');
    
    const name = partyMembers[currentIndex]?.name;
    promptBox.textContent = name ? `What should ${name} do?` : "Close the party menu?";
  }

  function handleExit() {
    window.location.href = '../index.html';
  }

  // Responsive Scaling Logic
  function scaleUI() {
    const scale = Math.min(window.innerWidth / 512, window.innerHeight / 384);
    dexScreen.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', scaleUI);
  scaleUI();
  initParty();
</script>
</body>
</html>
