<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unova B2W2 Party UI - Responsive</title>
  <style>
    @font-face {
      font-family: 'PokemonBW';
      src: url('pokemon-b-w.otf') format('woff2');
    }

    :root {
      --text-color: #fff;
      --font-family: 'PokemonBW', sans-serif;
      /* Responsive sizing variables */
      --ui-width: 512px;
      --ui-height: 384px;
      --hp-green: #43ef21;
    }

    body {
      font-family: var(--font-family);
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-color);
      overflow-x: hidden;
      text-transform: uppercase;
      image-rendering: pixelated;
    }

    .party-screen {
      width: 95vw;
      max-width: var(--ui-width);
      aspect-ratio: 4 / 3; /* Keeps the DS screen ratio */
      background: #0e141b url('Graphics/Pictures/Party/bg_B2W2.png') center/cover no-repeat;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2%;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      width: 98%;
      z-index: 2;
    }

    .box {
      width: 100%;
      height: 85px; 
      padding: 10px 10px 10px 55px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-sizing: border-box;
      position: relative;
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }

    /* Column offset logic - Only applies on desktop/tablet */
    @media (min-width: 550px) {
        .box:nth-child(even) { transform: translateY(12px); }
    }

    /* Mobile View: Single Column */
    @media (max-width: 549px) {
        .grid { grid-template-columns: 1fr; gap: 2px; height: 75%; overflow-y: auto; }
        .box { height: 70px; padding-left: 50px; }
        .party-screen { aspect-ratio: auto; height: 95vh; padding-bottom: 80px; }
        .pokemon-sprite { width: 50px !important; height: 50px !important; }
        .top-info { font-size: 14px !important; }
    }

    .box.pokemon { background-image: url('Graphics/Pictures/Party/panel_round.png'); }
    .box.pokemon.highlight { 
        background-image: url('Graphics/Pictures/Party/panel_round_sel.png'); 
        filter: brightness(1.1); 
    }
    .box.empty { background-image: url('Graphics/Pictures/Party/panel_blank.png'); opacity: 0.5; }

    .pokemon-sprite {
      position: absolute;
      left: 5px;
      top: 50%;
      transform: translateY(-50%);
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .top-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 16px;
      text-shadow: 2px 2px #000;
    }

    .hp-section {
      position: relative;
      width: 100%;
      max-width: 140px;
      height: 14px;
      margin-top: 4px;
      background: rgba(0,0,0,0.3);
      border-radius: 2px;
    }

    .hp-bar-fill {
      position: absolute;
      top: 3px;
      left: 2px;
      height: 8px;
      z-index: 1;
      transition: width 0.3s ease;
      background-color: var(--hp-green); 
      box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
    }

    .hp-text {
      font-size: 12px;
      text-align: right;
      text-shadow: 1px 1px #000;
      margin-top: 2px;
    }

    /* Footer adjustments */
    .footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: clamp(60px, 15%, 85px);
      background: url('Graphics/Pictures/Menu/background3.png') no-repeat center bottom;
      background-size: cover;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      box-sizing: border-box;
    }

    #cancel-btn {
      width: 35%;
      height: 40px;
      background: url('Graphics/Pictures/Party/icon_cancel.png') center/contain no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    #cancel-btn span {
      font-size: 18px;
      margin-left: 10px;
    }

    #cancel-btn.highlight { background-image: url('Graphics/Pictures/Party/icon_cancel_sel.png'); }

    .prompt {
      background: white;
      color: #333;
      padding: 0 10px;
      border: 3px solid #707070;
      width: 60%; 
      height: 45px;
      display: flex;
      align-items: center; 
      font-size: 14px;
      text-transform: none;
      box-sizing: border-box;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="party-screen">
  <div class="grid" id="party-grid"></div>

  <div class="footer">
    <div class="prompt">Choose a Pokémon.</div>
    <div id="cancel-btn" onclick="window.location.href='../index.html'">
      <span>CANCEL</span>
    </div>
  </div>
</div>

<script>
  // ... Keep your existing partyMembers array ...
  const partyMembers = [
    { id: 34,  name: 'NIDOKING',  lv: 50, chp: 205, mhp: 205 },
    { id: 2,   name: 'IVYSAUR',   lv: 50, chp: 134, mhp: 134 },
    { id: 130, name: 'GYARADOS',  lv: 20, chp: 68,  mhp: 68 },
    { id: 448, name: 'LUCARIO',   lv: 52, chp: 150, mhp: 150 },
    { id: 637, name: 'VOLCARONA', lv: 70, chp: 210, mhp: 230 },
    { id: 571, name: 'ZOROARK',   lv: 45, chp: 110, mhp: 125 }
  ];

  const grid = document.getElementById('party-grid');
  const promptBox = document.querySelector('.prompt');
  let elements = [];
  let currentIndex = 0;

  function initParty() {
    grid.innerHTML = '';
    partyMembers.forEach((p) => {
      const box = document.createElement('div');
      box.className = 'box pokemon';
      box.onclick = () => { currentIndex = partyMembers.indexOf(p); updateSelection(); };
      
      const pct = (p.chp / p.mhp) * 100;

      const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${p.id}.gif`;
      const fallbackUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;

      box.innerHTML = `
        <img src="${spriteUrl}" class="pokemon-sprite" onerror="this.src='${fallbackUrl}'">
        <div class="top-info">
          <span>${p.name}</span>
          <span>LV ${p.lv}</span>
        </div>
        <div class="hp-section">
          <div class="hp-bar-fill" style="width: ${pct}%;"></div>
        </div>
        <div class="hp-text">${p.chp} / ${p.mhp}</div>
      `;
      grid.appendChild(box);
    });

    for(let i = partyMembers.length; i < 6; i++) {
      const empty = document.createElement('div');
      empty.className = 'box empty';
      grid.appendChild(empty);
    }

    elements = [...document.querySelectorAll('.box'), document.getElementById('cancel-btn')];
    updateSelection();
  }

  function updateSelection() {
    elements.forEach(el => el.classList.remove('highlight'));
    if(elements[currentIndex]) elements[currentIndex].classList.add('highlight');
    
    const name = partyMembers[currentIndex]?.name;
    promptBox.textContent = name ? `What should ${name} do?` : "Choose a Pokémon.";
  }

  // Navigation logic
  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const isMobile = window.innerWidth < 550;

    if (key === 'w' || key === 'arrowup') {
        currentIndex = isMobile ? Math.max(0, currentIndex - 1) : (currentIndex === 6 ? 4 : (currentIndex - 2 + 7) % 7);
    } 
    else if (key === 's' || key === 'arrowdown') {
        currentIndex = isMobile ? Math.min(6, currentIndex + 1) : ((currentIndex >= 4 && currentIndex < 6) ? 6 : (currentIndex === 6 ? 0 : (currentIndex + 2) % 7));
    }
    else if (key === 'a' || key === 'arrowleft' || key === 'd' || key === 'arrowright') {
        if (!isMobile && currentIndex < 6) currentIndex = (currentIndex % 2 === 0) ? currentIndex + 1 : currentIndex - 1;
    }

    updateSelection();
  });

  initParty();
</script>
</body>
</html>
