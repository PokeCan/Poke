<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BW2 Bag Screen</title>
    <style>
        /* --- 1. MOBILE SCALING & GLOBAL SETUP --- */
* { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
}

/* --- MOBILE CONTROLS OVERLAY --- */
#touch-controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 999;
    padding: 0 20px;
}

/* The DPAD Cluster */
.dpad {
    display: grid;
    grid-template-areas: 
        ". up ."
        "left . right"
        ". down .";
    gap: 10px;
}

.dpad div, .actions div {
    width: 60px;
    height: 60px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid #fff;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
    font-size: 24px;
    /* Prevents the phone from highlighting the button text */
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

#btn-up    { grid-area: up; }
#btn-left  { grid-area: left; }
#btn-right { grid-area: right; }
#btn-down  { grid-area: down; }

/* Action Buttons (A/B) */
.actions {
    display: flex;
    gap: 20px;
}

.actions div {
    border-radius: 50%; /* Circle buttons for A/B */
    width: 70px;
    height: 70px;
    background: rgba(255, 255, 255, 0.3);
}

#btn-a { background: rgba(255, 0, 0, 0.4) !important; } /* Red-ish A button */

/* Hide controls on desktop if you want */
@media (pointer: fine) {
    #touch-controls { display: none; }
}

body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    /* Ensuring no text selection interferes with fast tapping on mobile */
    user-select: none;
    -webkit-user-select: none;
    font-family: sans-serif; 
}

/* The Canvas Scaler treats the screen like a fixed viewport (Graphics.width/height) */
#canvas-scaler {
    width: 512px;
    height: 384px;
    transform-origin: center;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
}

/* --- 2. THE MAIN SCENE (bg.png) --- */
.bag-screen {
    width: 512px;
    height: 384px;
    background: url('Graphics/Pictures/Bag/bg.png') no-repeat center;
    position: relative;
    image-rendering: pixelated; /* Keeps the DS look sharp */
}

/* --- 3. THE BAG SPRITE (bag1.png - bag6.png) --- */
#bag-container {
    position: absolute;
    left: 38px;
    top: 30px;
    width: 110px; /* One frame width */
    height: 120px;
    overflow: hidden;
}

#bag-sprite {
    width: 110px;
    height: 120px;
    background-size: 330px 120px; /* 3 states in one horizontal png */
    background-repeat: no-repeat;
    transition: background-position 0.1s steps(1);
}

/* Sprite States for each frame of the 3-state sheet */
.state-closed { background-position: 0px 0px; }      /* Frame 1 */
.state-mid    { background-position: -110px 0px; }   /* Frame 2 */
.state-open   { background-position: -220px 0px; }   /* Frame 3 */

#pocket-name {
    position: absolute;
    top: 180px; /* Matches Ruby y=180 coordinate */
    left: 38px;
    width: 110px;
    text-align: center;
    color: #F8F8F8;
    text-shadow: 2px 2px #5A5A5A;
    font-size: 20px;
    font-weight: bold;
    text-transform: uppercase;
}

/* --- 4. THE ITEM LIST (panel.png & panel_select.png) --- */
/* Coordinates match x=168, y=8 from your script */
#item-window {
    position: absolute;
    left: 168px;
    top: 8px;
    width: 314px;
    height: 224px; /* ITEMSVISIBLE (7) * 32px height */
    overflow: hidden;
}

.item-row {
    height: 32px;
    display: flex;
    align-items: center;
    padding: 0 15px 0 52px; /* Padding for the selection arrow space */
    color: #F8F8F8;
    text-shadow: 1px 1px #5A5A5A;
    background: url('Graphics/Pictures/Bag/panel.png') no-repeat center;
    background-size: 100% 100%;
}

.item-row.selected {
    background: url('Graphics/Pictures/Bag/panel_select.png') no-repeat center;
    background-size: 100% 100%;
}

/* Color for Sorting Mode (@sortIndex logic) */
.item-row.sorting {
    color: #E00000; 
}

/* --- 5. THE SLIDER (slider.png & slider_bg.png) --- */
#slider-track {
    position: absolute;
    right: 15px;
    top: 60px; /* Matches slider ycoord=60 */
    width: 14px;
    height: 140px;
    background: url('Graphics/Pictures/Bag/slider_bg.png') repeat-y center;
}

#slider-thumb {
    position: absolute;
    width: 18px;
    height: 24px;
    left: -2px;
    background: url('Graphics/Pictures/Bag/slider.png') no-repeat center;
}

/* --- 6. DESCRIPTION & ICON (item_bg.png) --- */
#item-description {
    position: absolute;
    left: 72px; /* Matches itemtextwindow x=72 */
    top: 270px; /* Matches itemtextwindow y=270 */
    width: 440px;
    height: 114px;
    padding: 15px 25px;
    color: #F8F8F8;
    font-size: 16px;
    line-height: 1.4;
    background: url('Graphics/Pictures/Bag/panel.png') no-repeat center;
    background-size: 100% 100%;
}

#item-icon {
    position: absolute;
    left: 24px; /* Matches icon x=24 */
    top: 312px; /* Matches icon y=312 */
    width: 48px;
    height: 48px;
    object-fit: contain;
}

.loading-text {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #F8F8F8;
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 2px 2px #5A5A5A;
}
    </style>
</head>
<body>

    <div id="canvas-scaler">
        
        <div class="bag-screen">
            
            <div id="bag-container">
                <div id="bag-sprite" class="state-closed"></div>
                <div id="pocket-name">ITEMS</div>
            </div>

            <div id="arrow-left"></div>
            <div id="arrow-right"></div>

            <div id="item-window"></div>

            <div id="slider-track">
                <div id="slider-thumb"></div>
            </div>

            <div id="footer-container">
                <img src="" id="item-icon" alt="">
                <div id="item-description"></div>
            </div>

        </div>

        <div id="touch-controls">
            <div class="dpad">
                <div id="btn-up">▲</div>
                <div class="dpad-horizontal">
                    <div id="btn-left">◀</div>
                    <div id="btn-right">▶</div>
                </div>
                <div id="btn-down">▼</div>
            </div>
            <div class="actions">
                <div id="btn-a">A</div>
                <div id="btn-b">B</div>
            </div>
        </div>

    </div>

    <script>
        /**
 * BW2 Bag Logic - Final Master Script
 * Pocket Order: 1:Balls, 2:Med, 3:TMs, 4:Berries, 5:Key, 6:Misc
 */

const ITEMS_VISIBLE_COUNT = 7;
let currentPocket = 1;
let currentIndex = 0;
let scrollTops = [0, 0, 0, 0, 0, 0, 0]; 
let isSortingMode = false;

let BAG_DATA = {
    1: { name: "POKÉ BALLS", file: "Graphics/Pictures/Bag/bag1.png", items: [] },
    2: { name: "MEDICINE", file: "Graphics/Pictures/Bag/bag2.png", items: [] },
    3: { name: "TMs & HMs", file: "Graphics/Pictures/Bag/bag3.png", items: [] },
    4: { name: "BERRIES", file: "Graphics/Pictures/Bag/bag4.png", items: [] },
    5: { name: "KEY ITEMS", file: "Graphics/Pictures/Bag/bag5.png", items: [] },
    6: { name: "ITEMS", file: "Graphics/Pictures/Bag/bag6.png", items: [] } 
};

const POKEMON_ITEMS_TO_FETCH = [
    'poke-ball', 'great-ball', 'ultra-ball', 'master-ball', 'quick-ball',
    'potion', 'super-potion', 'revive', 'antidote',
    'tm01', 'tm02', 'tm03', 'tm04',
    'cheri-berry', 'lum-berry', 'sitrus-berry',
    'bicycle', 'old-rod', 'town-map',
    'rare-candy', 'repel', 'dire-hit', 'x-attack'
];

// --- 1. Data Logic & Pocket Routing ---

async function initializeBagSystem() {
    const itemWindow = document.getElementById('item-window');
    
    // Check Cache (V5 for hardcoded routing update)
    const cachedData = localStorage.getItem('bw2_bag_v5');
    if (cachedData) {
        BAG_DATA = JSON.parse(cachedData);
        refreshBagUI();
    } else {
        itemWindow.innerHTML = '<div class="loading-text">LOADING...</div>';
    }

    try {
        const promises = POKEMON_ITEMS_TO_FETCH.map(name => 
            fetch(`https://pokeapi.co/api/v2/item/${name}`).then(res => res.json())
        );

        const apiResults = await Promise.all(promises);

        // Reset current lists
        Object.keys(BAG_DATA).forEach(id => BAG_DATA[id].items = []);

        apiResults.forEach(data => {
            const name = data.name;
            const category = data.category.name;
            let pId = 6; // Default to Misc (Pocket 6)

            // Explicit Pocket Routing
            if (name.includes('ball')) {
                pId = 1;
            } else if (name.includes('potion') || name === 'revive' || name.includes('antidote') || category.includes('healing')) {
                pId = 2;
            } else if (name.includes('tm') || name.includes('hm')) {
                pId = 3;
            } else if (name.includes('berry')) {
                pId = 4;
            } else if (name === 'bicycle' || name === 'old-rod' || name === 'town-map') {
                pId = 5;
            }

            const flavor = data.flavor_text_entries.find(e => 
                e.version_group.name === "black-white" && e.language.name === "en"
            ) || data.flavor_text_entries[0];

            BAG_DATA[pId].items.push({
                displayName: name.replace(/-/g, ' ').toUpperCase(),
                quantity: (pId === 3 || pId === 5) ? 1 : Math.floor(Math.random() * 10) + 1,
                description: flavor ? flavor.text : "A helpful item.",
                spriteUrl: data.sprites.default
            });
        });

        localStorage.setItem('bw2_bag_v5', JSON.stringify(BAG_DATA));
        refreshBagUI();
        
    } catch (error) {
        console.error("API Error:", error);
    }
}

// --- 2. Animations & UI Rendering ---

async function playBagAnimation(targetState) {
    const sprite = document.getElementById('bag-sprite');
    if (sprite.classList.contains(targetState)) {
        sprite.classList.remove('bounce-animation');
        void sprite.offsetWidth; 
        sprite.classList.add('bounce-animation');
        return;
    }
    sprite.classList.remove('bounce-animation');
    void sprite.offsetWidth;
    sprite.className = "state-mid bounce-animation";
    await new Promise(r => setTimeout(r, 90));
    sprite.className = targetState + " bounce-animation";
}

function refreshBagUI() {
    const pocket = BAG_DATA[currentPocket];
    const items = pocket.items;
    const itemWindow = document.getElementById('item-window');

    document.getElementById('bag-sprite').style.backgroundImage = `url('${pocket.file}')`;
    document.getElementById('pocket-name').textContent = pocket.name;

    playBagAnimation(currentIndex < items.length ? "state-open" : "state-closed");

    itemWindow.innerHTML = '';
    const top = scrollTops[currentPocket];
    
    for (let i = top; i < top + ITEMS_VISIBLE_COUNT; i++) {
        if (i > items.length) break;
        const row = document.createElement('div');
        row.className = `item-row ${i === currentIndex ? 'selected' : ''} ${isSortingMode && i === currentIndex ? 'sorting' : ''}`;
        
        if (i === items.length) {
            // "CLOSE BAG" with functional link
            row.innerHTML = `<a href="index.html" style="color: #FFF; text-decoration: none; width: 100%; height: 100%; display: flex; align-items: center;">CLOSE BAG</a>`;
        } else {
            row.innerHTML = `<span>${items[i].displayName}</span><span style="margin-left:auto">x${items[i].quantity}</span>`;
        }
        itemWindow.appendChild(row);
    }

    const cur = items[currentIndex];
    document.getElementById('item-description').textContent = cur ? cur.description : "Exit the bag and return to the main menu.";
    const icon = document.getElementById('item-icon');
    if (cur) {
        icon.src = cur.spriteUrl;
        icon.style.display = "block";
    } else {
        icon.style.display = "none";
    }

    document.getElementById('slider-thumb').style.top = `${(currentIndex / Math.max(1, items.length)) * 116}px`;
}

// --- 3. Input & Navigation Logic ---

function handleInput(dir) {
    const items = BAG_DATA[currentPocket].items;
    const max = items.length;

    switch(dir) {
        case 'up':
            if (isSortingMode && currentIndex > 0 && currentIndex < max) {
                [items[currentIndex], items[currentIndex - 1]] = [items[currentIndex - 1], items[currentIndex]];
            }
            currentIndex = (currentIndex - 1 + (max + 1)) % (max + 1);
            break;
        case 'down':
            if (isSortingMode && currentIndex < max - 1) {
                [items[currentIndex], items[currentIndex + 1]] = [items[currentIndex + 1], items[currentIndex]];
            }
            currentIndex = (currentIndex + 1) % (max + 1);
            break;
        case 'left':
            if (isSortingMode) break;
            currentPocket = (currentPocket === 1) ? 6 : currentPocket - 1;
            currentIndex = 0;
            break;
        case 'right':
            if (isSortingMode) break;
            currentPocket = (currentPocket % 6) + 1;
            currentIndex = 0;
            break;
        case 'action':
            if (currentIndex < max) {
                isSortingMode = !isSortingMode;
            } else {
                // Trigger the redirect if "CLOSE BAG" is selected and A is pressed
                window.location.href = "index.html";
            }
            break;
    }

    const top = scrollTops[currentPocket];
    if (currentIndex < top) scrollTops[currentPocket] = currentIndex;
    else if (currentIndex >= top + ITEMS_VISIBLE_COUNT) scrollTops[currentPocket] = currentIndex - ITEMS_VISIBLE_COUNT + 1;

    refreshBagUI();
}

// --- 4. Event Listeners & Mobile Support ---

window.addEventListener('keydown', (e) => {
    const map = { 'ArrowUp':'up', 'w':'up', 'ArrowDown':'down', 's':'down', 'ArrowLeft':'left', 'a':'left', 'ArrowRight':'right', 'd':'right', 'Enter':'action', 'q':'action' };
    if (map[e.key]) handleInput(map[e.key]);
});

function resize() {
    const sc = Math.min(window.innerWidth / 512, window.innerHeight / 384);
    const scaler = document.getElementById('canvas-scaler');
    if (scaler) scaler.style.transform = `scale(${sc})`;
}

window.addEventListener('resize', resize);

window.addEventListener('DOMContentLoaded', () => {
    resize();
    
    // Virtual Controller Support
    ['btn-up', 'btn-down', 'btn-left', 'btn-right', 'btn-a'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleInput(id.replace('btn-', ''));
                if (navigator.vibrate) navigator.vibrate(10);
            });
        }
    });

    initializeBagSystem();
});
    </script>
</body>
</html>
