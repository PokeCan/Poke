<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pokédex - Info</title>
<link rel="icon" type="png" href="Graphics/pokeBallIcon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: #111;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    overflow: hidden;
    touch-action: none; /* Prevents mobile browser pull-to-refresh */
  }

  /* ── Scaling Container ── */
  .dex-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 512px;
    height: 384px;
  }

  .info-screen {
    background: url(Graphics/Pictures/pokedex/bg_info.png);
    width: 512px; height: 384px;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
    flex-shrink: 0;
    transform-origin: center center;
  }

  /* Layer 1: scrolling bg */
  .bg-scroll {
    position: absolute; inset: 0;
    background: url(Graphics/Pictures/pokedex/bg_list.png); /* Fallback to list bg if needed */
    animation: bgscroll 10s linear infinite;
    z-index: 0;
  }
  @keyframes bgscroll {
    from { background-position: 0 0; }
    to   { background-position: 0 384px; }
  }

  /* Layer 2: info_overlay chrome */
  .info-overlay {
    position: absolute; inset: 0;
    background: url(Graphics/Pictures/pokedex/info_overlay.png);
    image-rendering: pixelated;
    z-index: 2;
    pointer-events: none;
  }

  /* Left Sprite Zone */
  .sprite-zone {
    position: absolute;
    top: 36px; left: 0;
    width: 205px; height: 116px;
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
    pointer-events: none;
  }
  #main-sprite {
    width: 110px; height: 110px;
    object-fit: contain;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
    transition: opacity 0.12s;
  }
  #main-sprite.fade { opacity: 0; }

  /* Owned Icon */
  .owned-icon {
    position: absolute;
    top: 19px; left: 210px;
    width: 22px; height: 22px;
    background: url(Graphics/Pictures/pokedex/icon_own.png);
    z-index: 4;
  }

  /* Right Data Panel */
  .row-name {
    position: absolute;
    top: 21px; left: 265px; right: 17px;
    height: 37px;
    display: flex; align-items: center;
    padding: 0 12px; gap: 6px;
    z-index: 4;
  }
  .poke-num, .poke-name {
    font-size: 11px; color: #52525a;
    text-shadow: 1px 1px #a5a5ad;
  }

  .row-category {
    position: absolute;
    top: 56px; left: 256px; right: 17px;
    height: 31px;
    display: flex; align-items: center; justify-content: center;
    z-index: 4;
  }
  .poke-category { font-size: 7px; color: #52525a; text-shadow: 1px 1px #a5a5ad; }

  .row-types {
    position: absolute;
    top: 90px; left: 256px; right: 17px;
    height: 44px;
    display: flex; align-items: center; justify-content: center;
    gap: 4px; z-index: 4;
  }
  .type-badge {
    height: 20px; 
    padding: 0 8px;
    font-size: 7px;
    display: flex; 
    align-items: center;
    border-radius: 2px;
    color: #fff;
    text-shadow: 1px 1px rgba(0,0,0,0.5);
    text-transform: capitalize;
    letter-spacing: 0.3px;
    border: 1px solid rgba(0,0,0,0.25);
  }

  /* Your Specific Type Colors */
  .t-normal   { background:#A8A878; color:#333; }
  .t-fire     { background:#F08030; }
  .t-water    { background:#6890F0; }
  .t-grass    { background:#78C850; }
  .t-electric { background:#F8D030; color:#333; }
  .t-ice      { background:#98D8D8; color:#333; }
  .t-fighting { background:#C03028; }
  .t-poison   { background:#A040A0; }
  .t-ground   { background:#E0C068; color:#333; }
  .t-flying   { background:#A890F0; }
  .t-psychic  { background:#F85888; }
  .t-bug      { background:#A8B820; }
  .t-rock     { background:#B8A038; }
  .t-ghost    { background:#705898; }
  .t-dragon   { background:#7038F8; }
  .t-dark     { background:#705848; }
  .t-steel    { background:#B8B8D0; color:#333; }
  .t-fairy    { background:#EE99AC; }
  
  .row-ht, .row-wt {
    position: absolute; left: 290px; right: 20px;
    height: 22px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 4px; z-index: 4;
  }
  .row-ht { top: 133px; }
  .row-wt { top: 160px; }

  .data-label, .data-value { font-size: 7px; color: #52525a; text-shadow: 1px 1px #a5a5ad; }

  /* Flavour Text */
  .flavour-text {
    position: absolute;
    top: 218px; left: 38px; right: 38px;
    height: 100px; font-size: 7px;
    line-height: 1.8; color: #ffffff;
    text-shadow: 1px 1px #000;
    z-index: 4;
  }

  /* Nav Arrows - Bigger Hitboxes for Touch */
  .nav-prev, .nav-next {
    position: absolute;
    top: 100%; bottom: 0%;
    width: 50px;
    display: flex; align-items: end; justify-content: end;
    font-size: 50px; color: #000000;
    cursor: pointer; z-index: 10;
    opacity: 0;
    margin:0;
  }
  .nav-prev { left: 1px; }
  .nav-next { right: 190px;}

  /* ESC button */
  .esc {
    width: 64px; height: 32px;
    position: absolute;
    top: 335px; left: 420px;
    cursor: pointer; z-index: 10;
    opacity: 0;
  }
  .esc img { width: 100%; 
           opacity: 0;}
  .esc2 { filter: brightness(1.5) sepia(1); transform: translateY(2px); }
</style>
</head>
<body>

<div class="dex-wrapper">
  <div class="info-screen">
    <div class="bg-scroll"></div>
    <div class="info-overlay"></div>

    <div class="sprite-zone">
      <img id="main-sprite" class="fade" src="" alt="">
    </div>

    <div class="row-name">
      <span class="poke-num" id="poke-num">000</span>
      <span class="poke-name" id="poke-name">---</span>
    </div>

    <div class="row-category">
      <span class="poke-category" id="poke-category">--- Pokémon</span>
    </div>

    <div class="row-types" id="types"></div>

    <div class="row-ht">
      <span class="data-label">HEIGHT</span>
      <span class="data-value" id="poke-ht">0.0 m</span>
    </div>

    <div class="row-wt">
      <span class="data-label">WEIGHT</span>
      <span class="data-value" id="poke-wt">0.0 kg</span>
    </div>

    <div class="flavour-text" id="flavour"></div>

    <div class="nav-prev" onclick="navigate(-1)">&#9664;</div>
    <div class="nav-next" onclick="navigate(1)">&#9654;</div>

    <div class="esc" onclick="handleExit()">
      <img src="Graphics/Pictures/Menu/esc.png" alt="Exit">
    </div>
  </div>
</div>

<script>
const spriteEl = document.getElementById('main-sprite');
const numEl    = document.getElementById('poke-num');
const nameEl   = document.getElementById('poke-name');
const catEl    = document.getElementById('poke-category');
const typesEl  = document.getElementById('types');
const htEl     = document.getElementById('poke-ht');
const wtEl     = document.getElementById('poke-wt');
const flavEl   = document.getElementById('flavour');
const escButton = document.querySelector('.esc');
const dexScreen = document.querySelector('.info-screen');

const params = new URLSearchParams(window.location.search);
let currentId = parseInt(params.get('id')) || 1;

// Load Data
async function load(id) {
    try {
        spriteEl.classList.add('fade');
        const [res, specRes] = await Promise.all([
            fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
            fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
        ]);
        
        const data = await res.json();
        const specData = await specRes.json();

        numEl.textContent = String(data.id).padStart(3, '0');
        nameEl.textContent = data.name;
        
        const category = specData.genera.find(g => g.language.name === 'en');
        catEl.textContent = category ? category.genus : "??? Pokémon";

        typesEl.innerHTML = data.types.map(t => 
              `<div class="type-badge t-${t.type.name}">${t.type.name}</div>`
          ).join('');

        htEl.textContent = (data.height / 10).toFixed(1) + ' m';
        wtEl.textContent = (data.weight / 10).toFixed(1) + ' kg';

        const flavor = specData.flavor_text_entries.find(f => f.language.name === 'en');
        flavEl.textContent = flavor ? flavor.flavor_text.replace(/[\f\n\r]/g, ' ') : "No data.";

        spriteEl.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        spriteEl.onload = () => spriteEl.classList.remove('fade');
        
        currentId = id;
    } catch (err) { console.error(err); }
}

  

function navigate(dir) {
    currentId += dir;
    if (currentId < 1) currentId = 151;
    if (currentId > 151) currentId = 1;
    load(currentId);
}

function handleExit() { 
    escButton.classList.add('esc2');
    setTimeout(() => window.location.href = 'index.html', 100); 
}

// Swipe Support
let touchX = 0;
window.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
window.addEventListener('touchend', e => {
    let diff = touchX - e.changedTouches[0].clientX;
    if(Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
});

// Key Controls
window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'Escape') handleExit();
});

// Responsive Scaling
function scaleScreen() {
    const scale = Math.min(window.innerWidth / 512, window.innerHeight / 384);
    dexScreen.style.transform = `scale(${scale})`;
}

window.addEventListener('resize', scaleScreen);
scaleScreen();
load(currentId);
</script>
</body>
</html>
