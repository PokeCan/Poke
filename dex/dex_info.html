<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex - Info</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    overflow: hidden;
  }

  .info-screen {
    background: url(Graphics/Pictures/Menu/bg_info.png);
    width: 512px; height: 384px;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
  }

  /* Layer 1: scrolling bg */
  .bg-scroll {
    position: absolute; inset: 0;
    animation: bgscroll 10s linear infinite;
    z-index: 0;
  }
  @keyframes bgscroll {
    from { background-position: 0 0; }
    to   { background-position: 0 384px; }
  }

  /* Layer 2: info_overlay chrome */
  .info-overlay {
    position: absolute; inset: 0;
    width: 512px; height: 384px;
    background: url(Graphics/Pictures/Menu/info_overlay.png);
    image-rendering: pixelated;
    z-index: 2;
    pointer-events: none;
  }

  /* ── SPRITE (left panel, x=0-220, sprite centered x=98 y=94 per Ruby)
     Black area y=36-151  ── */
  .sprite-zone {
    position: absolute;
    top: 36px; left: 0;
    width: 205px; height: 116px;
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
    pointer-events: none;
  }
  #main-sprite {
    width: 128px; height: 128px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
    transition: opacity 0.12s;
  }
  #main-sprite.fade { opacity: 0; }

  /* ── OWNED ICON (Ruby: x=210 y=19) ── */
  .owned-icon {
    position: absolute;
    top: 19px; left: 210px;
    width: 22px; height: 22px;
    background: url("data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAAcABwDASIAAhEBAxEB/8QAGAAAAwEBAAAAAAAAAAAAAAAABAcIBgD/xAAqEAABBAEDAgYCAwEAAAAAAAABAgMEBREABiESEwcUIjFBUXGBCEJhYv/EABgBAAMBAQAAAAAAAAAAAAAAAAMEBQIG/8QAIhEAAQMDBAMBAAAAAAAAAAAAAQIDBAARIQUSMUETFHFh/9oADAMBAAIRAxEAPwCfvB7w3ibrgS76+muRqaOtcdKYzoRIekJCFhtsLQUqJQo4TnJOPjTqrtr1sSvjRqbZe1JEVtpKQ5e1aVS1EADKykYJIAJ/66tC7cEWm2/tSsiUz0iNIo4du43CjBSzKUgJLpAwPYAFWOr250fdbtmRHY6WqWex1uJChLilJUDnIT6uTxx+9cw645JUVKJtfAqrpMbS3G1PT3SM2CRz9rN7u8LtsbkedLcY0N35QiOiKhuNWvPerpQkdBUpZWrgDkoSPkanS7rpFRczqmV0mRCkOR3enOOtCik4yAcZHyBqtLK9cdrkyjt26S7HHmWnVwsNocSCQsnPCR75HONJD+SMOLH3ZSzI8dpl2zomJ8rtoCe4+646VrOPcn7OT9k6b095xt7xKJIIxfq1K6lHixpO2I5vQRf5+UyvAzc7t/tGMO/BF3TKRHEdCz33q1ltv0oTkqUsrOAOEE/R00HbPbstLblsmHEfThSWbENodQfg9KjkYJI/IOogqbSzqJXmqmxmV8jp6e7GfU0vGQcZSQcZAP6GmLX+Nu4Y8FiPM29te3dabSjzVlCcffcwAMqWXOSeSf8AST86I4HIRJRYpJ4PVSyFNnHBqkbexamMhlkJjVccd+ZMkYRFcjJBC0IWD0lRScgHjHJ1JvjBuRe5d7SnEqjqhV5XAgKZOUqjNur7Zzkg8K/rgfQ128PEjdO5XClyaqshKZ7KoFc66zFUn1Zy31kHhXT+ABrH6PFaW4v2HSL2wB1Wm0lR3qr/2Q==") center / contain no-repeat;
    image-rendering: pixelated;
    z-index: 4;
  }

  /* ── RIGHT DATA PANEL
     x=256-495, rows starting y=18
     Text color from Ruby: base=Color(82,82,90), shadow=Color(165,165,173)
  ── */

  /* Name + dex number row: y=18-55 (38px tall) */
  .row-name {
    position: absolute;
    top: 18px; left: 256px; right: 17px;
    height: 37px;
    display: flex; align-items: center;
    padding: 0 12px;
    gap: 6px;
    z-index: 4;
  }
  .poke-num {
    font-size: 9px; color: #52525a;
    text-shadow: 1px 1px #a5a5ad;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .poke-name {
    font-size: 9px; color: #52525a;
    text-shadow: 1px 1px #a5a5ad;
    text-transform: capitalize;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* Category row: y=56-87 (32px) */
  .row-category {
    position: absolute;
    top: 56px; left: 256px; right: 17px;
    height: 31px;
    display: flex; align-items: center; justify-content: center;
    z-index: 4;
  }
  .poke-category {
    font-size: 8px; color: #52525a;
    text-shadow: 1px 1px #a5a5ad;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* Data rows (y=88-134, six 8px zones with 2px dividers)
     Types zone ~y=88-134 (maps to Ruby y=94)
     We'll stack: types, then height/weight below
  */
  .row-types {
    position: absolute;
    top: 90px; left: 256px; right: 17px;
    height: 44px;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    z-index: 4;
  }
  .type-badge {
    height: 20px; padding: 0 8px;
    font-size: 7px;
    display: flex; align-items: center;
    border-radius: 2px;
    color: #fff;
    text-shadow: 1px 1px rgba(0,0,0,0.5);
    text-transform: capitalize;
    letter-spacing: 0.3px;
    border: 1px solid rgba(0,0,0,0.25);
  }
  .t-normal   { background:#A8A878; color:#333; }
  .t-fire     { background:#F08030; }
  .t-water    { background:#6890F0; }
  .t-grass    { background:#78C850; }
  .t-electric { background:#F8D030; color:#333; }
  .t-ice      { background:#98D8D8; color:#333; }
  .t-fighting { background:#C03028; }
  .t-poison   { background:#A040A0; }
  .t-ground   { background:#E0C068; color:#333; }
  .t-flying   { background:#A890F0; }
  .t-psychic  { background:#F85888; }
  .t-bug      { background:#A8B820; }
  .t-rock     { background:#B8A038; }
  .t-ghost    { background:#705898; }
  .t-dragon   { background:#7038F8; }
  .t-dark     { background:#705848; }
  .t-steel    { background:#B8B8D0; color:#333; }
  .t-fairy    { background:#EE99AC; }

  /* Height row: y=136-157 (Ruby: label at y=132, value right-aligned at x=490) */
  .row-ht {
    position: absolute;
    top: 136px; left: 260px; right: 20px;
    height: 22px;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    z-index: 4;
  }

  /* Weight row: y=162-189 (Ruby: label at y=162) */
  .row-wt {
    position: absolute;
    top: 160px; left: 260px; right: 20px;
    height: 22px;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    z-index: 4;
  }

  .data-label {
    font-size: 7px; color: #52525a;
    text-shadow: 1px 1px #a5a5ad;
    letter-spacing: 0.3px;
  }
  .data-value {
    font-size: 7px; color: #52525a;
    text-shadow: 1px 1px #a5a5ad;
    letter-spacing: 0.3px;
    text-align: right;
  }

  /* ── FLAVOUR TEXT
     Ruby: drawTextEx at x=38 y=220, width=432, 4 lines
  ── */
  .flavour-text {
    position: absolute;
    top: 218px; left: 38px; right: 38px;
    height: 100px;
    font-size: 7.5px;
    line-height: 1.75;
    color: #ffffff;
    text-shadow: 1px 1px #000;
    text-transform: none;
    overflow: hidden;
    z-index: 4;
    pointer-events: none;
  }

  /* ── FOOTPRINT area (x=207-261, y=94-161) — transparent, sprite shows thru ── */

  /* ── PAGE NAVIGATION (top-right of overlay) ── */
  .page-tabs {
    position: absolute;
    top: 0; right: 0;
    display: flex; flex-direction: row;
    gap: 2px; padding: 2px 4px 0;
    z-index: 10;
  }
  .page-tab {
    padding: 3px 8px;
    font-size: 6px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-bottom: none;
    color: #888;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .page-tab.active { background: #333; color: #fff; }
  .page-tab:hover { background: #222; }

  /* ── NAVIGATION ← → arrows ── */
  .nav-prev, .nav-next {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 20px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: rgba(255,255,255,0.3);
    cursor: pointer; z-index: 10;
    user-select: none;
  }
  .nav-prev { left: 0; }
  .nav-next { right: 0; }
  .nav-prev:hover, .nav-next:hover { color: rgba(255,255,255,0.7); }

  .esc{
    width: 67px; height: 30%;
    font-size: 1rem;
    color: #000;
    position: absolute;
    top: 90%;
    left: 82%;
    cursor: pointer; z-index: 10;
  }
  .esc:active {
    transform: scale(0.95); /* Shrinks slightly when clicked */
    filter: brightness(0.8);  /* Dims the image slightly */
    opacity: 0.8;
}



/* The active state class */
.esc2 {
    filter: sepia(1) saturate(5) hue-rotate(175deg); /* Example: changes color to a glowing blue */
    transform: translateY(2px); /* Mimics a button press */
}
</style>
</head>
<body>
<div class="info-screen">

  <!-- bg scrolling -->
  <div class="bg-scroll"></div>

  <!-- Sprite in left black zone -->
  <div class="sprite-zone">
    <img id="main-sprite" class="fade" src="" alt="">
  </div>

  <!-- info_overlay chrome on top -->
  <div class="info-overlay"></div>

  <!-- Owned icon -->
  <div class="owned-icon"></div>

  <!-- Name row -->
  <div class="row-name">
    <span class="poke-num" id="poke-num">001</span>
    <span class="poke-name" id="poke-name">Loading…</span>
  </div>

  <!-- Category row -->
  <div class="row-category">
    <span class="poke-category" id="poke-category">????? Pokémon</span>
  </div>

  <!-- Types row -->
  <div class="row-types" id="types"></div>

  <!-- Height row -->
  <div class="row-ht">
    <span class="data-label">HEIGHT</span>
    <span class="data-value" id="poke-ht">—</span>
  </div>

  <!-- Weight row -->
  <div class="row-wt">
    <span class="data-label">WEIGHT</span>
    <span class="data-value" id="poke-wt">—</span>
  </div>

  <!-- Flavour text -->
  <div class="flavour-text" id="flavour"></div>

  <!-- Page nav tap zones -->
  <div class="nav-prev" onclick="navigate(-1)">&#9664;</div>
  <div class="nav-next" onclick="navigate(1)">&#9654;</div>


  <a href="index.html"><div class="esc"><img src="Graphics/Pictures/Menu/esc.png" alt=""></div></a>

</div>

<script>
const spriteEl = document.getElementById('main-sprite');
const numEl    = document.getElementById('poke-num');
const nameEl   = document.getElementById('poke-name');
const catEl    = document.getElementById('poke-category');
const typesEl  = document.getElementById('types');
const htEl     = document.getElementById('poke-ht');
const wtEl     = document.getElementById('poke-wt');
const flavEl   = document.getElementById('flavour');
const escButton = document.querySelector('.esc');

// Get ID from URL or default to 1
const params = new URLSearchParams(window.location.search);
let currentId = parseInt(params.get('id')) || 1;

async function load(id) {
    try {
        spriteEl.classList.add('fade');
        
        // Fetch Main Data and Species Data (for flavor text/category)
        const [res, specRes] = await Promise.all([
            fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
            fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
        ]);
        
        const data = await res.json();
        const specData = await specRes.json();

        // Update Text Fields
        numEl.textContent = String(data.id).padStart(3, '0');
        nameEl.textContent = data.name.replace(/-/g, ' ');
        
        // Category (Genera)
        const category = specData.genera.find(g => g.language.name === 'en');
        catEl.textContent = category ? category.genus : "????? Pokémon";

        // Types
        typesEl.innerHTML = data.types.map(t => 
            `<div class="type-badge t-${t.type.name}">${t.type.name}</div>`
        ).join('');

        // Height/Weight (API is in decimeters/hectograms)
        htEl.textContent = (data.height / 10).toFixed(1) + ' m';
        wtEl.textContent = (data.weight / 10).toFixed(1) + ' kg';

        // Flavour Text (find first English entry)
        const flavor = specData.flavor_text_entries.find(f => f.language.name === 'en');
        flavEl.textContent = flavor ? flavor.flavor_text.replace(/\f/g, ' ') : "No data available.";

        // Sprite
        const animUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${id}.gif`;
        const staticUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        
        const tmp = new Image();
        tmp.onload = () => { spriteEl.src = tmp.src; spriteEl.classList.remove('fade'); };
        tmp.onerror = () => { spriteEl.src = staticUrl; spriteEl.classList.remove('fade'); };
        tmp.src = animUrl;

        currentId = id;
    } catch (err) {
        console.error("Error loading Pokémon:", err);
    }
}

function navigate(dir) {
    let nextId = currentId + dir;
    if (nextId < 1) nextId = 151;
    if (nextId > 151) nextId = 1;
    load(nextId);
}

// Visual & Keyboard Logic
escButton.addEventListener('mousedown', () => escButton.classList.add('esc2'));
escButton.addEventListener('mouseup', () => escButton.classList.remove('esc2'));

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') navigate(-1);
    if (e.key === 'ArrowRight' || e.key === 'd') navigate(1);
    if (e.key === 'Escape' || e.key === 'Backspace') {
        escButton.classList.add('esc2');
        window.location.href = 'index.html';
    }
});

window.addEventListener('wheel', e => navigate(e.deltaY > 0 ? 1 : -1), { passive: true });

// Initial Load
load(currentId);
</script>
</body>
</html>
