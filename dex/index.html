<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BW Pokédex</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    image-rendering: pixelated;
    overflow: hidden; /* Prevents scrollbars on the body */
    touch-action: none; /* Prevents phone browser refresh-on-swipe */
  }

  /* ── The Container ── */
  .dex-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
  }

  /* ── 512×384 screen (Base Resolution) ── */
  .dex-screen {
    background: url(Graphics/Pictures/Menu/bg_list.png);
    width: 512px;
    height: 384px;
    position: relative;
    image-rendering: pixelated;
    overflow: hidden;
    flex-shrink: 0;
    /* This origin is crucial for centering the scale */
    transform-origin: center center; 
  }

  /* Layers */
  .layer {
    position: absolute;
    top: 0; left: 0;
    width: 512px; height: 384px;
    image-rendering: pixelated;
    pointer-events: none;
  }

  .bg-scroll {
    position: absolute;
    top: 0; left: 0;
    width: 512px; height: 384px;
    animation: bgscroll 8s linear infinite;
  }
  @keyframes bgscroll {
    from { background-position: 0 0; }
    to   { background-position: 0 384px; }
  }

  .list-overlay { background: url(Graphics/Pictures/Menu/list_overlay.png); }

  /* Left panel sprite */
  .preview-panel {
    position: absolute;
    top: 96px; left: 0;
    width: 220px; height: 220px;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }
  #poke-sprite {
    width: 144px; height: 144px;
    object-fit: contain;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
    transition: opacity 0.12s;
  }
  #poke-sprite.fade { opacity: 0; }

  /* List rows */
  .list-viewport {
    position: absolute;
    top: 94px; left: 209px;
    width: 274px; height: 250px;
    overflow: hidden;
    z-index: 4;
    pointer-events: auto; /* Allow scrolling here */
  }
  .scrolling-list {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    transition: transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .entry {
    width: 303px; height: 42px;
    position: relative;
    display: flex; align-items: center;
    cursor: pointer;
    background: url(Graphics/Pictures/Menu/pokedexSel.png);
  }
  .entry.active { background: url(Graphics/Pictures/Menu/pokedexSel2.png); }

  .entry-icon-wrap {
    position: absolute;
    left: 18px; top: 3px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .entry-icon { width: 34px; height: 34px; object-fit: contain; }

  .entry-num {
    position: absolute; left: 68px;
    font-size: 8px; text-shadow: 1px 1px #000;
  }
  .entry-name {
    position: absolute; left: 104px;
    font-size: 8px; color: #dedede;
    text-shadow: 1px 1px #000;
    text-transform: capitalize;
  }

  /* Header Display */
  .header-entry {
    position: absolute;
    top: 54px; left: 48px;
    width: 240px; height: 32px;
    display: flex; align-items: center; gap: 6px;
    z-index: 6;
  }
  .header-num, .header-name { font-size: 9px; color: #333; }

  /* Scrollbar */
  .scrollbar-thumb {
    position: absolute;
    left: 489px; width: 22px; height: 30px;
    z-index: 6;
    background: url(Graphics/Pictures/Menu/icon_slider.png) no-repeat center;
    background-size: contain;
    transition: top 0.18s ease-out;
  }

  /* Exit Button */
  .esc {
    width: 64px; height: 40px;
    position: absolute;
    top: 330px; left: 430px;
    cursor: pointer; z-index: 10;
    opacity: 0;
  }
  .esc img { width: 100%; height: auto; opacity:0; }
  .esc2 { filter: brightness(1.5) saturate(1.5); transform: translateY(2px); }
</style>
</head>
<body>

<div class="dex-wrapper">
  <div class="dex-screen">
    <div class="bg-scroll layer"></div>
    <div class="list-overlay layer"></div>

    <div class="preview-panel">
      <img id="poke-sprite" class="fade" src="" alt="">
    </div>

    <div class="header-entry">
      <span class="header-num" id="header-num">000</span>
      <span class="header-name" id="header-name">---</span>
    </div>

    <div class="list-viewport">
      <div class="scrolling-list" id="dex-list"></div>
    </div>

    <div class="scrollbar-thumb" id="scrollbar-thumb"></div>

    <div class="esc" onclick="handleExit()">
      <img src="Graphics/Pictures/Menu/exit.png" alt="Exit">
    </div>
  </div>
</div>

<script>
const listEl = document.getElementById('dex-list');
const spriteEl = document.getElementById('poke-sprite');
const hNum = document.getElementById('header-num');
const hName = document.getElementById('header-name');
const thumb = document.getElementById('scrollbar-thumb');
const escButton = document.querySelector('.esc');
const dexScreen = document.querySelector('.dex-screen');

const ENTRY_H = 42;
const TRACK_TOP = 48;
const TRACK_H = 289;
const THUMB_H = 30;

let pokemonData = [];
let currentIndex = 0;

async function fetchPokemon() {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151');
    const data = await res.json();
    pokemonData = data.results;
    renderList();
    updateSelection(false);
}

function renderList() {
    listEl.innerHTML = pokemonData.map((p, i) => `
        <div class="entry" id="p-${i}" onclick="selectPokemon(${i})">
            <div class="entry-icon-wrap">
                <img class="entry-icon" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png" loading="lazy">
            </div>
            <span class="entry-num">${String(i+1).padStart(3,'0')}</span>
            <span class="entry-name">${p.name}</span>
        </div>`).join('');
}

function updateSelection(animate = true) {
    document.querySelectorAll('.entry').forEach(el => el.classList.remove('active'));
    const active = document.getElementById(`p-${currentIndex}`);
    if (!active) return;
    active.classList.add('active');

    listEl.style.transition = animate ? 'transform 0.2s ease-out' : 'none';
    listEl.style.transform = `translateY(-${currentIndex * ENTRY_H}px)`;

    const pct = currentIndex / (pokemonData.length - 1);
    thumb.style.top = Math.round(TRACK_TOP + pct * (TRACK_H - THUMB_H)) + 'px';

    hNum.textContent = String(currentIndex + 1).padStart(3, '0');
    hName.textContent = pokemonData[currentIndex].name;

    spriteEl.classList.add('fade');
    spriteEl.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${currentIndex + 1}.png`;
    spriteEl.onload = () => spriteEl.classList.remove('fade');
}

function navigate(dir) {
    currentIndex = Math.max(0, Math.min(pokemonData.length - 1, currentIndex + dir));
    updateSelection();
}

function selectPokemon(index) {
    if(currentIndex === index) window.location.href = `dex_info.html?id=${index+1}`;
    else { currentIndex = index; updateSelection(); }
}

function handleExit() { window.location.href = "../index.html"; }

// Touch Logic
let startY = 0;
window.addEventListener('touchstart', e => startY = e.touches[0].clientY, {passive: false});
window.addEventListener('touchmove', e => {
    let diff = startY - e.touches[0].clientY;
    if(Math.abs(diff) > 30) {
        navigate(diff > 0 ? 1 : -1);
        startY = e.touches[0].clientY;
    }
}, {passive: false});

// Keyboard
window.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') navigate(-1);
    if (e.key === 'ArrowDown') navigate(1);
    if (e.key === 'Escape') handleExit();
});

// Scaling logic
function scaleScreen() {
    const scale = Math.min(window.innerWidth / 512, window.innerHeight / 384);
    dexScreen.style.transform = `scale(${scale})`;
}

window.addEventListener('resize', scaleScreen);
fetchPokemon();
scaleScreen();
</script>
</body>
</html>
